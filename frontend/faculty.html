<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faculty Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="d-flex">

<!-- Sidebar -->

<div class="sidebar">

<h3 class="text-center py-3">
<i class="fa-solid fa-graduation-cap"></i> SMS
</h3>

<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
<span>Dashboard</span>
</a>

<a href="students.html">
<i class="fa-solid fa-user-graduate"></i>
<span>Students</span>
</a>

<a href="faculty.html" class="active">
<i class="fa-solid fa-chalkboard-user"></i>
<span>Faculty</span>
</a>

<a href="courses.html">
<i class="fa-solid fa-book"></i>
<span>Courses</span>
</a>

<a href="attendance.html">
<i class="fa-solid fa-calendar-check"></i>
<span>Attendance</span>
</a>


</div>

<!-- Content -->

<div class="content flex-grow-1">

<nav class="navbar bg-white shadow-sm px-4">

<h4 class="fw-bold">
Faculty Management
</h4>

<div>

<span id="username" class="fw-bold text-primary me-3"></span>

<button class="btn btn-danger" onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</div>

</nav>

<div class="container-fluid mt-4">

<div class="card shadow">

<div class="card-body">

<div class="row mb-3">

<div class="col-md-4">

<input
type="text"
id="search"
class="form-control"
placeholder="🔍 Search Faculty">

</div>

<div class="col-md-8 text-end">

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#facultyModal">

<i class="fa-solid fa-plus"></i>

Add Faculty

</button>

</div>

</div>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-primary">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th width="150">Actions</th>

</tr>

</thead>

<tbody id="facultyTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- Modal -->

<div class="modal fade" id="facultyModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Add Faculty</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input
id="faculty_name"
class="form-control mb-3"
placeholder="Faculty Name">

<input
id="email"
class="form-control mb-3"
placeholder="Email">

<input
id="department"
class="form-control"
placeholder="Department">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="addFaculty()">

Save Faculty

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/faculty.js"></script>

</body>

</html>
