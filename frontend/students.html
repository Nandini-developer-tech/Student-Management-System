<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Students | Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="text-center py-3">
            <i class="fa-solid fa-graduation-cap"></i> SMS
        </h3>

        <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
        </a>

        <a href="students.html" class="active">
            <i class="fa-solid fa-user-graduate"></i>
            <span>Students</span>
        </a>

        <a href="faculty.html">
            <i class="fa-solid fa-chalkboard-user"></i>
            <span>Faculty</span>
        </a>

        <a href="courses.html">
            <i class="fa-solid fa-book"></i>
            <span>Courses</span>
        </a>

        <a href="attendance.html">
            <i class="fa-solid fa-calendar-check"></i>
            <span>Attendance</span>
        </a>


    </div>

    <!-- Main Content -->

    <div class="content flex-grow-1">

        <!-- Navbar -->

        <nav class="navbar bg-white shadow-sm px-4">

            <h4 class="fw-bold">
                Student Management
            </h4>

            <div>

                <span id="username" class="me-3 fw-bold text-primary"></span>

                <button class="btn btn-danger" onclick="logout()">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </button>

            </div>

        </nav>

        <!-- Content -->

        <div class="container-fluid mt-4">

            <div class="card shadow">

                <div class="card-body">

                    <!-- Top Buttons -->

                    <div class="row mb-3">

                        <div class="col-md-4">

                            <input
                                    type="text"
                                    id="search"
                                    class="form-control"
                                    placeholder="🔍 Search Student">

                        </div>

                        <div class="col-md-8 text-end">

                            <button class="btn btn-success" onclick="exportExcel()">
                                <i class="fa-solid fa-file-excel"></i>
                                Excel
                            </button>

                            <button class="btn btn-danger" onclick="exportPDF()">
                                <i class="fa-solid fa-file-pdf"></i>
                                PDF
                            </button>

                            <label class="btn btn-warning mb-0">
                                <i class="fa-solid fa-upload"></i>
                                Import CSV
                                <input
                                        type="file"
                                        id="csvFile"
                                        hidden
                                        onchange="importCSV()">
                            </label>

                            <button
                                    class="btn btn-primary"
                                    data-bs-toggle="modal"
                                    data-bs-target="#studentModal">

                                <i class="fa-solid fa-plus"></i>

                                Add Student

                            </button>

                        </div>

                    </div>

                    <!-- Table -->

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-primary">

                            <tr>

                                <th>ID</th>

                                <th>Name</th>

                                <th>Email</th>

                                <th>Phone</th>

                                <th>Course</th>

                                <th>Year</th>

                                <th width="170">Actions</th>

                            </tr>

                            </thead>

                            <tbody id="studentTable">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Add Student Modal -->

<div class="modal fade" id="studentModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Add Student</h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <input id="name" class="form-control mb-3" placeholder="Student Name">

                <input id="email" class="form-control mb-3" placeholder="Email">

                <input id="phone" class="form-control mb-3" placeholder="Phone">

                <input id="course" class="form-control mb-3" placeholder="Course ID">

                <input id="year" class="form-control" placeholder="Year">

            </div>

            <div class="modal-footer">

                <button class="btn btn-success" onclick="addStudent()">

                    Save Student

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/students.js"></script>

</body>

</html>
